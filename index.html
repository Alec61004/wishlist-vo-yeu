<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Wishlist của Thảo</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, query, where, getDocs, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAwK43XQv8Yc6Dh7yogwMlJEmAvYfpzpLI",
            authDomain: "wishlist-thao.firebaseapp.com",
            projectId: "wishlist-thao",
            storageBucket: "wishlist-thao.firebasestorage.app",
            messagingSenderId: "355598647381",
            appId: "1:355598647381:web:f2a88da7a0fe56679714dc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseApp = app;
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseAuthMethods = { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged };
        window.firestoreMethods = { collection, doc, setDoc, getDoc, updateDoc, deleteDoc, query, where, getDocs, onSnapshot };
    </script>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-header">
                <h1>💕 Wishlist của Thảo</h1>
                <p class="subtitle">Đăng nhập để tiếp tục</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Tên đăng nhập</label>
                    <input type="text" id="loginUsername" required placeholder="Nhập tên đăng nhập...">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mật khẩu</label>
                    <input type="password" id="loginPassword" required placeholder="Nhập mật khẩu...">
                </div>
                <button type="submit" class="btn-primary">Đăng nhập 🔐</button>
                <p class="login-hint">Chưa có tài khoản? <a href="#" id="showRegister">Đăng ký ngay</a></p>
            </form>
        </div>
    </div>

    <!-- Register Screen -->
    <div id="registerScreen" class="login-screen" style="display: none;">
        <div class="login-container">
            <div class="login-header">
                <h1>💕 Đăng ký tài khoản</h1>
                <p class="subtitle">Tạo tài khoản mới</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regUsername">Tên đăng nhập *</label>
                    <input type="text" id="regUsername" required placeholder="Nhập tên đăng nhập...">
                </div>
                <div class="form-group">
                    <label for="regPassword">Mật khẩu *</label>
                    <input type="password" id="regPassword" required placeholder="Nhập mật khẩu...">
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword">Xác nhận mật khẩu *</label>
                    <input type="password" id="regConfirmPassword" required placeholder="Nhập lại mật khẩu...">
                </div>
                <button type="submit" class="btn-primary">Đăng ký 📝</button>
                <p class="login-hint">Đã có tài khoản? <a href="#" id="showLogin">Đăng nhập ngay</a></p>
            </form>
        </div>
    </div>

    <!-- Main App (hidden until login) -->
    <div id="mainApp" class="container" style="display: none;">
        <header>
            <h1>💕 Wishlist của Thảo</h1>
            <p class="subtitle">Những điều má phính muốn...</p>
            <p id="modeBadge" class="mode-badge"></p>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="sun">☀️</span>
                <span class="moon">🌙</span>
            </button>
        </header>

        <!-- Add Form (only for owner) -->
        <div class="add-form owner-only">
            <h2>➕ Thêm mới</h2>
            <form id="wishlistForm">
                <div class="form-group">
                    <label for="itemName">Tên món đồ / địa điểm *</label>
                    <input type="text" id="itemName" required placeholder="Ví dụ: Túi xách, Đà Lạt...">
                </div>
                
                <div class="form-group">
                    <label for="itemType">Loại</label>
                    <select id="itemType">
                        <option value="item">🎁 Món đồ</option>
                        <option value="place">🗺️ Địa điểm muốn đi</option>
                        <option value="experience">✨ Trải nghiệm</option>
                        <option value="other">💭 Khác</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="itemLink">Link (tùy chọn)</label>
                    <input type="url" id="itemLink" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label for="itemNote">Ghi chú</label>
                    <textarea id="itemNote" rows="2" placeholder="Màu sắc, kích thước, lý do..."></textarea>
                </div>

                <button type="submit" class="btn-primary">Thêm vào wishlist 💖</button>
            </form>
        </div>

        <!-- Filter Section (only for owner) -->
        <div class="filter-section owner-only">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="item">🎁 Món đồ</button>
            <button class="filter-btn" data-filter="place">🗺️ Địa điểm</button>
            <button class="filter-btn" data-filter="experience">✨ Trải nghiệm</button>
            <button class="filter-btn" data-filter="other">💭 Khác</button>
        </div>

        <!-- Random Section (for everyone) -->
        <div class="random-section">
            <button id="randomBtn" class="btn-random">🎲 Random Gift - Chọn ngẫu nhiên!</button>
        </div>

        <!-- Wishlist (only for owner) -->
        <div class="wishlist owner-only" id="wishlist">
            <!-- Items will be rendered here -->
        </div>

        <!-- Empty State (only for owner) -->
        <div class="empty-state owner-only" id="emptyState" style="display: none;">
            <p>🌸 Chưa có gì trong wishlist cả</p>
            <p>Thêm những điều em muốn nhé!</p>
        </div>

        <!-- Logout Section -->
        <div class="logout-section">
            <button id="logoutBtn" class="btn-logout">🚪 Đăng xuất</button>
        </div>

        <!-- Random Modal -->
        <div id="randomModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎁 Món quà ngẫu nhiên!</h2>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <div class="modal-body" id="randomResult"></div>
                <div class="modal-footer">
                    <button class="btn-secondary" id="randomAgain">🔄 Random lại</button>
                    <button class="btn-primary" id="randomConfirm">✅ Chọn món này!</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
